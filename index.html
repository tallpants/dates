<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Dates</title>
  <style>
    body {
      margin: 16px;
      color: #111;
      background: #fff;
    }

    fieldset {
      margin: 0 0 16px;
      padding: 12px 16px 16px;
      border: 2px groove #bbb;
    }

    legend {
      font-weight: 700;
      padding: 0 6px;
    }

    label {
      display: inline-block;
      margin: 0 12px 10px 0;
      font-weight: 700;
    }

    input {
      width: 4.5em;
      margin-left: 4px;
      padding: 4px 6px;
    }

    input[name$="month"],
    input[name$="day"] {
      width: 3.5em;
    }

    .outputs {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
    }

    #epoch-outputs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .output {
      min-width: 0;
    }

    .output label {
      display: block;
      margin: 0 0 4px;
    }

    output,
    .epoch-value {
      box-sizing: border-box;
      display: block;
      width: 100%;
      min-height: 1.4em;
      margin: 0;
      padding: 6px 8px;
      border: 1px solid #888;
      overflow-wrap: anywhere;
    }

    button {
      margin-top: 6px;
      padding: 3px 10px;
      cursor: pointer;
    }

    .epoch-heading {
      margin-bottom: 8px;
      font-weight: 700;
    }

    .epoch-heading button {
      margin: 0 8px 0 0;
    }

    .epoch-time {
      margin-top: 10px;
      overflow-wrap: anywhere;
    }

    .add-date {
      margin-bottom: 14px;
    }

    .add-result {
      margin-bottom: 14px;
      font-weight: 700;
    }

    .add-result button {
      margin: 0 8px 0 0;
    }

    .amounts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .amounts label {
      display: block;
    }

    .amounts input {
      box-sizing: border-box;
      display: block;
      width: 100%;
      margin: 4px 0 0;
    }

    @media (max-width: 760px) {
      .outputs,
      #epoch-outputs {
        grid-template-columns: 1fr;
      }

      .amounts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <fieldset>
      <legend>Dates</legend>
      <div>
        <label>Year <input name="first-year" inputmode="numeric" autocomplete="off" maxlength="4" autofocus></label>
        <label>Month <input name="first-month" inputmode="numeric" autocomplete="off" maxlength="2"></label>
        <label>Date <input name="first-day" inputmode="numeric" autocomplete="off" maxlength="2"></label>
      </div>
      <div>
        <label>Year <input name="second-year" inputmode="numeric" autocomplete="off" maxlength="4"></label>
        <label>Month <input name="second-month" inputmode="numeric" autocomplete="off" maxlength="2"></label>
        <label>Date <input name="second-day" inputmode="numeric" autocomplete="off" maxlength="2"></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Difference</legend>
      <div class="outputs">
        <div class="output">
          <label for="days">Days</label>
          <output id="days"></output>
          <button type="button" data-copy="days">Copy</button>
        </div>
        <div class="output">
          <label for="weeks-days">Weeks+Days</label>
          <output id="weeks-days"></output>
          <button type="button" data-copy="weeks-days">Copy</button>
        </div>
        <div class="output">
          <label for="months-days">Months+Days</label>
          <output id="months-days"></output>
          <button type="button" data-copy="months-days">Copy</button>
        </div>
        <div class="output">
          <label for="hours">Hours</label>
          <output id="hours"></output>
          <button type="button" data-copy="hours">Copy</button>
        </div>
        <div class="output">
          <label for="minutes">Minutes</label>
          <output id="minutes"></output>
          <button type="button" data-copy="minutes">Copy</button>
        </div>
        <div class="output">
          <label for="seconds">Seconds</label>
          <output id="seconds"></output>
          <button type="button" data-copy="seconds">Copy</button>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>UNIX Epoch</legend>
      <div class="outputs" id="epoch-outputs">
        <div class="output">
          <div class="epoch-heading">
            <button type="button" data-copy="first-epoch-copy">Copy</button>First Date
          </div>
          <input class="epoch-value" id="first-epoch" data-epoch="first" inputmode="numeric" autocomplete="off">
          <div class="epoch-time" id="first-epoch-local"></div>
          <div class="epoch-time" id="first-epoch-utc"></div>
          <span id="first-epoch-copy" hidden></span>
        </div>
        <div class="output">
          <div class="epoch-heading">
            <button type="button" data-copy="second-epoch-copy">Copy</button>Second Date
          </div>
          <input class="epoch-value" id="second-epoch" data-epoch="second" inputmode="numeric" autocomplete="off">
          <div class="epoch-time" id="second-epoch-local"></div>
          <div class="epoch-time" id="second-epoch-utc"></div>
          <span id="second-epoch-copy" hidden></span>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Add / Subtract</legend>
      <div class="add-date">
        <label>Year <input name="calc-year" inputmode="numeric" autocomplete="off" maxlength="4"></label>
        <label>Month <input name="calc-month" inputmode="numeric" autocomplete="off" maxlength="2"></label>
        <label>Date <input name="calc-day" inputmode="numeric" autocomplete="off" maxlength="2"></label>
      </div>
      <div class="add-result">
        <button type="button" data-copy="add-result">Copy</button>
        <span id="add-result"></span>
      </div>
      <div class="amounts">
        <label>Days <input class="amount" name="add-days" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
        <label>Weeks <input class="amount" name="add-weeks" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
        <label>Months <input class="amount" name="add-months" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
        <label>Years <input class="amount" name="add-years" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
      </div>
    </fieldset>
  </main>

  <script>
    const dayMs = 24 * 60 * 60 * 1000;
    const dateInputs = Array.from(document.querySelectorAll('input[name$="-year"], input[name$="-month"], input[name$="-day"]'));
    const epochInputs = Array.from(document.querySelectorAll("[data-epoch]"));
    const amountInputs = Array.from(document.querySelectorAll(".amount"));
    const copyButtons = Array.from(document.querySelectorAll("[data-copy]"));
    const timeState = {
      first: null,
      second: null
    };
    const outputs = {
      days: document.getElementById("days"),
      weeksDays: document.getElementById("weeks-days"),
      monthsDays: document.getElementById("months-days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      firstEpoch: document.getElementById("first-epoch"),
      secondEpoch: document.getElementById("second-epoch"),
      firstEpochLocal: document.getElementById("first-epoch-local"),
      secondEpochLocal: document.getElementById("second-epoch-local"),
      firstEpochUtc: document.getElementById("first-epoch-utc"),
      secondEpochUtc: document.getElementById("second-epoch-utc"),
      firstEpochCopy: document.getElementById("first-epoch-copy"),
      secondEpochCopy: document.getElementById("second-epoch-copy"),
      addResult: document.getElementById("add-result")
    };
    const blankEpoch = { epoch: "", local: "", utc: "" };

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function digitsOnly(value) {
      return value.replace(/\D/g, "");
    }

    function signedDigitsOnly(value) {
      const trimmed = value.trim();
      const sign = trimmed.startsWith("-") ? "-" : "";
      return sign + trimmed.replace(/\D/g, "");
    }

    function datePrefix(name) {
      return name.split("-")[0];
    }

    function timeParts(date) {
      return {
        hours: date.getHours(),
        minutes: date.getMinutes(),
        seconds: date.getSeconds(),
        milliseconds: date.getMilliseconds()
      };
    }

    function setDateFields(prefix, date) {
      document.querySelector(`[name="${prefix}-year"]`).value = date.getFullYear();
      document.querySelector(`[name="${prefix}-month"]`).value = pad2(date.getMonth() + 1);
      document.querySelector(`[name="${prefix}-day"]`).value = pad2(date.getDate());
    }

    function setToday(prefix) {
      setDateFields(prefix, new Date());
    }

    function readDate(prefix) {
      const yearText = document.querySelector(`[name="${prefix}-year"]`).value.trim();
      const monthText = document.querySelector(`[name="${prefix}-month"]`).value.trim();
      const dayText = document.querySelector(`[name="${prefix}-day"]`).value.trim();

      if (!yearText && !monthText && !dayText) return { missing: true };
      if (!/^\d{1,4}$/.test(yearText) || !/^\d{1,2}$/.test(monthText) || !/^\d{1,2}$/.test(dayText)) {
        return { invalid: true };
      }

      const year = Number(yearText);
      const month = Number(monthText);
      const day = Number(dayText);
      const local = new Date(year, month - 1, day);

      if (
        local.getFullYear() !== year ||
        local.getMonth() !== month - 1 ||
        local.getDate() !== day
      ) {
        return { invalid: true };
      }

      return {
        year,
        month,
        day,
        utcMs: Date.UTC(year, month - 1, day)
      };
    }

    function daysInMonth(year, month) {
      return new Date(Date.UTC(year, month, 0)).getUTCDate();
    }

    function daysInLocalMonth(year, monthIndex) {
      return new Date(year, monthIndex + 1, 0).getDate();
    }

    function addMonths(date, months) {
      const monthIndex = date.month - 1 + months;
      const year = date.year + Math.floor(monthIndex / 12);
      const month = ((monthIndex % 12) + 12) % 12 + 1;
      const day = Math.min(date.day, daysInMonth(year, month));

      return {
        year,
        month,
        day,
        utcMs: Date.UTC(year, month - 1, day)
      };
    }

    function addToLocalDate(date, years, months, weeks, days) {
      const rawMonth = date.month - 1 + months;
      const year = date.year + years + Math.floor(rawMonth / 12);
      const monthIndex = ((rawMonth % 12) + 12) % 12;
      const day = Math.min(date.day, daysInLocalMonth(year, monthIndex));
      const result = new Date(year, monthIndex, day);
      result.setDate(result.getDate() + weeks * 7 + days);
      return result;
    }

    function monthDayDiff(first, second) {
      const start = first.utcMs <= second.utcMs ? first : second;
      const end = first.utcMs <= second.utcMs ? second : first;
      let months = (end.year - start.year) * 12 + end.month - start.month;
      let anchor = addMonths(start, months);

      if (anchor.utcMs > end.utcMs) {
        months -= 1;
        anchor = addMonths(start, months);
      }

      return {
        months,
        days: Math.round((end.utcMs - anchor.utcMs) / dayMs)
      };
    }

    function plural(value, word) {
      return `${value} ${word}${value === 1 ? "" : "s"}`;
    }

    function utcStringFor(date) {
      const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

      return [
        days[date.getUTCDay()],
        months[date.getUTCMonth()],
        pad2(date.getUTCDate()),
        date.getUTCFullYear(),
        `${pad2(date.getUTCHours())}:${pad2(date.getUTCMinutes())}:${pad2(date.getUTCSeconds())}`,
        "GMT"
      ].join(" ");
    }

    function epochDateFor(prefix, date) {
      const time = timeState[prefix] || timeParts(new Date());
      return new Date(
        date.year,
        date.month - 1,
        date.day,
        time.hours,
        time.minutes,
        time.seconds,
        time.milliseconds
      );
    }

    function epochPartsFor(prefix, date) {
      const epochDate = epochDateFor(prefix, date);

      return {
        epoch: String(Math.floor(epochDate.getTime() / 1000)),
        local: epochDate.toString(),
        utc: utcStringFor(epochDate)
      };
    }

    function clearDifference() {
      outputs.days.textContent = "";
      outputs.weeksDays.textContent = "";
      outputs.monthsDays.textContent = "";
      outputs.hours.textContent = "";
      outputs.minutes.textContent = "";
      outputs.seconds.textContent = "";
    }

    function renderEpochs(first, second) {
      renderEpoch("first", first);
      renderEpoch("second", second);
    }

    function renderEpoch(prefix, date) {
      const ready = !date.invalid && !date.missing;
      const parts = ready ? epochPartsFor(prefix, date) : blankEpoch;
      const epochInput = outputs[`${prefix}Epoch`];

      if (document.activeElement !== epochInput) {
        epochInput.value = parts.epoch;
      }

      outputs[`${prefix}EpochLocal`].textContent = parts.local;
      outputs[`${prefix}EpochUtc`].textContent = parts.utc;
      outputs[`${prefix}EpochCopy`].textContent = ready ? `${parts.epoch} - ${parts.local} (${parts.utc})` : "";
    }

    function renderDifference(first, second) {
      if (first.invalid || second.invalid || first.missing || second.missing) {
        clearDifference();
        return;
      }

      const days = Math.round(Math.abs(second.utcMs - first.utcMs) / dayMs);
      const weeks = Math.floor(days / 7);
      const weekDays = days % 7;
      const monthsDays = monthDayDiff(first, second);

      outputs.days.textContent = plural(days, "day");
      outputs.weeksDays.textContent = `${plural(weeks, "week")}, ${plural(weekDays, "day")}`;
      outputs.monthsDays.textContent = `${plural(monthsDays.months, "month")}, ${plural(monthsDays.days, "day")}`;
      outputs.hours.textContent = plural(days * 24, "hour");
      outputs.minutes.textContent = plural(days * 24 * 60, "minute");
      outputs.seconds.textContent = plural(days * 24 * 60 * 60, "second");
    }

    function readAmount(name) {
      const text = document.querySelector(`[name="${name}"]`).value.trim();
      if (!text) return { value: 0, invalid: false };
      if (!/^-?\d+$/.test(text)) return { invalid: true };
      return { value: Number(text), invalid: false };
    }

    function renderAddSubtract() {
      const base = readDate("calc");

      if (base.invalid || base.missing) {
        outputs.addResult.textContent = "";
        return;
      }

      const days = readAmount("add-days");
      const weeks = readAmount("add-weeks");
      const months = readAmount("add-months");
      const years = readAmount("add-years");
      const amounts = [days, weeks, months, years];

      outputs.addResult.textContent = amounts.some((amount) => amount.invalid)
        ? ""
        : addToLocalDate(base, years.value, months.value, weeks.value, days.value).toDateString();
    }

    function render() {
      const first = readDate("first");
      const second = readDate("second");

      renderEpochs(first, second);
      renderDifference(first, second);
      renderAddSubtract();
    }

    function clearDate(prefix) {
      document.querySelector(`[name="${prefix}-year"]`).value = "";
      document.querySelector(`[name="${prefix}-month"]`).value = "";
      document.querySelector(`[name="${prefix}-day"]`).value = "";
      timeState[prefix] = null;
    }

    function syncDateFromEpoch(prefix) {
      const text = outputs[`${prefix}Epoch`].value.trim();
      const match = text.match(/^-?\d+/);

      if (!match) {
        clearDate(prefix);
        render();
        return;
      }

      const epochDate = new Date(Number(match[0]) * 1000);
      if (Number.isNaN(epochDate.getTime())) return;

      setDateFields(prefix, epochDate);
      timeState[prefix] = timeParts(epochDate);
      render();
    }

    async function copyOutput(id, button) {
      const output = document.getElementById(id);
      const text = ("value" in output ? output.value : output.textContent).trim();

      if (!text) return;

      await navigator.clipboard.writeText(text);
      const original = button.textContent;
      button.textContent = "Copied";
      window.setTimeout(() => {
        button.textContent = original;
      }, 900);
    }

    dateInputs.forEach((field) => {
      field.addEventListener("input", () => {
        field.value = digitsOnly(field.value);

        if (field.name.startsWith("first-") || field.name.startsWith("second-")) {
          timeState[datePrefix(field.name)] = timeParts(new Date());
        }

        render();
      });
    });

    epochInputs.forEach((field) => {
      field.addEventListener("input", (event) => {
        field.value = signedDigitsOnly(field.value);

        if (!field.value || event.inputType === "insertFromPaste") {
          syncDateFromEpoch(field.dataset.epoch);
        }
      });
      field.addEventListener("paste", () => {
        window.setTimeout(() => syncDateFromEpoch(field.dataset.epoch), 0);
      });
      field.addEventListener("change", () => {
        syncDateFromEpoch(field.dataset.epoch);
      });
    });

    amountInputs.forEach((field) => {
      field.addEventListener("input", () => {
        field.value = signedDigitsOnly(field.value);
        renderAddSubtract();
      });
    });

    copyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        copyOutput(button.dataset.copy, button);
      });
    });

    setToday("second");
    setToday("calc");
    timeState.second = timeParts(new Date());
    render();
  </script>
</body>
</html>
