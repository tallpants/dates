<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Dates</title>
  <style>
    body {
      margin: 16px;
      color: #111;
      background: #fff;
    }

    fieldset {
      margin: 0 0 16px;
      padding: 12px 16px 16px;
      border: 2px groove #bbb;
    }

    legend {
      font-weight: 700;
      padding: 0 6px;
    }

    label {
      display: inline-block;
      margin: 0 12px 10px 0;
      font-weight: 700;
    }

    input {
      width: 4.5em;
      margin-left: 4px;
      padding: 4px 6px;
    }

    input[name$="month"],
    input[name$="day"] {
      width: 3.5em;
    }

    .outputs,
    .amounts {
      display: grid;
      gap: 14px;
    }

    .outputs {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    #epoch-outputs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .output {
      min-width: 0;
    }

    .output label {
      display: block;
      margin: 0 0 4px;
    }

    output,
    .epoch-value {
      box-sizing: border-box;
      display: block;
      width: 100%;
      min-height: 1.4em;
      margin: 0;
      padding: 6px 8px;
      border: 1px solid #888;
      overflow-wrap: anywhere;
    }

    button {
      margin-top: 6px;
      padding: 3px 10px;
      cursor: pointer;
    }

    .epoch-heading {
      margin-bottom: 8px;
      font-weight: 700;
    }

    .epoch-heading button {
      margin: 0 8px 0 0;
    }

    .epoch-time {
      margin-top: 10px;
      overflow-wrap: anywhere;
    }

    .add-date {
      margin-bottom: 14px;
    }

    .add-result {
      margin-bottom: 14px;
      font-weight: 700;
    }

    .add-result button {
      margin: 0 8px 0 0;
    }

    .amounts label {
      display: block;
    }

    .amounts {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .amounts input {
      box-sizing: border-box;
      display: block;
      width: 100%;
      margin: 4px 0 0;
    }

    @media (max-width: 760px) {
      .outputs,
      #epoch-outputs {
        grid-template-columns: 1fr;
      }

      .amounts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <fieldset>
      <legend>Dates</legend>
      <div>
        <label>Year <input name="first-year" inputmode="numeric" autocomplete="off" maxlength="4" autofocus></label>
        <label>Month <input name="first-month" inputmode="numeric" autocomplete="off" maxlength="2"></label>
        <label>Date <input name="first-day" inputmode="numeric" autocomplete="off" maxlength="2"></label>
      </div>
      <div>
        <label>Year <input name="second-year" inputmode="numeric" autocomplete="off" maxlength="4"></label>
        <label>Month <input name="second-month" inputmode="numeric" autocomplete="off" maxlength="2"></label>
        <label>Date <input name="second-day" inputmode="numeric" autocomplete="off" maxlength="2"></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Difference</legend>
      <div class="outputs">
        <div class="output">
          <label for="days">Days</label>
          <output id="days"></output>
          <button type="button" data-copy="days">Copy</button>
        </div>
        <div class="output">
          <label for="weeks-days">Weeks+Days</label>
          <output id="weeks-days"></output>
          <button type="button" data-copy="weeks-days">Copy</button>
        </div>
        <div class="output">
          <label for="months-days">Months+Days</label>
          <output id="months-days"></output>
          <button type="button" data-copy="months-days">Copy</button>
        </div>
        <div class="output">
          <label for="hours">Hours</label>
          <output id="hours"></output>
          <button type="button" data-copy="hours">Copy</button>
        </div>
        <div class="output">
          <label for="minutes">Minutes</label>
          <output id="minutes"></output>
          <button type="button" data-copy="minutes">Copy</button>
        </div>
        <div class="output">
          <label for="seconds">Seconds</label>
          <output id="seconds"></output>
          <button type="button" data-copy="seconds">Copy</button>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>UNIX Epoch</legend>
      <div class="outputs" id="epoch-outputs">
        <div class="output">
          <div class="epoch-heading">
            <button type="button" data-copy="first-epoch-copy">Copy</button>First Date
          </div>
          <input class="epoch-value" id="first-epoch" data-epoch="first" inputmode="numeric" autocomplete="off">
          <div class="epoch-time" id="first-epoch-local"></div>
          <div class="epoch-time" id="first-epoch-utc"></div>
          <span id="first-epoch-copy" hidden></span>
        </div>
        <div class="output">
          <div class="epoch-heading">
            <button type="button" data-copy="second-epoch-copy">Copy</button>Second Date
          </div>
          <input class="epoch-value" id="second-epoch" data-epoch="second" inputmode="numeric" autocomplete="off">
          <div class="epoch-time" id="second-epoch-local"></div>
          <div class="epoch-time" id="second-epoch-utc"></div>
          <span id="second-epoch-copy" hidden></span>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Add / Subtract</legend>
      <div class="add-date">
        <label>Year <input name="calc-year" inputmode="numeric" autocomplete="off" maxlength="4"></label>
        <label>Month <input name="calc-month" inputmode="numeric" autocomplete="off" maxlength="2"></label>
        <label>Date <input name="calc-day" inputmode="numeric" autocomplete="off" maxlength="2"></label>
      </div>
      <div class="add-result">
        <button type="button" data-copy="add-result">Copy</button>
        <span id="add-result"></span>
      </div>
      <div class="amounts">
        <label>Days <input class="amount" name="add-days" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
        <label>Weeks <input class="amount" name="add-weeks" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
        <label>Months <input class="amount" name="add-months" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
        <label>Years <input class="amount" name="add-years" inputmode="numeric" pattern="-?[0-9]*" autocomplete="off"></label>
      </div>
    </fieldset>
  </main>

  <script>
    const dayMs = 24 * 60 * 60 * 1000;
    const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const epochTimes = { first: null, second: null };
    const $ = (id) => document.getElementById(id);
    const named = (name) => document.querySelector(`[name="${name}"]`);
    const dateField = (prefix, part) => named(`${prefix}-${part}`);

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function signedDigits(value) {
      const trimmed = value.trim();
      const sign = trimmed.startsWith("-") ? "-" : "";
      return sign + trimmed.replace(/\D/g, "");
    }

    function clock(date) {
      return [date.getHours(), date.getMinutes(), date.getSeconds(), date.getMilliseconds()];
    }

    function setDateFields(prefix, date) {
      dateField(prefix, "year").value = date.getFullYear();
      dateField(prefix, "month").value = pad2(date.getMonth() + 1);
      dateField(prefix, "day").value = pad2(date.getDate());
    }

    function readDate(prefix) {
      const yearText = dateField(prefix, "year").value.trim();
      const monthText = dateField(prefix, "month").value.trim();
      const dayText = dateField(prefix, "day").value.trim();

      if (!yearText && !monthText && !dayText) return null;
      if (!/^\d{1,4}$/.test(yearText) || !/^\d{1,2}$/.test(monthText) || !/^\d{1,2}$/.test(dayText)) {
        return null;
      }

      const year = Number(yearText);
      const month = Number(monthText);
      const day = Number(dayText);
      const local = new Date(year, month - 1, day);

      if (
        local.getFullYear() !== year ||
        local.getMonth() !== month - 1 ||
        local.getDate() !== day
      ) {
        return null;
      }

      return { year, month, day, utcMs: Date.UTC(year, month - 1, day) };
    }

    function addMonths(date, months) {
      const monthIndex = date.month - 1 + months;
      const year = date.year + Math.floor(monthIndex / 12);
      const month = ((monthIndex % 12) + 12) % 12 + 1;
      const day = Math.min(date.day, new Date(Date.UTC(year, month, 0)).getUTCDate());

      return { year, month, day, utcMs: Date.UTC(year, month - 1, day) };
    }

    function addToLocalDate(date, years, months, weeks, days) {
      const rawMonth = date.month - 1 + months;
      const year = date.year + years + Math.floor(rawMonth / 12);
      const monthIndex = ((rawMonth % 12) + 12) % 12;
      const day = Math.min(date.day, new Date(year, monthIndex + 1, 0).getDate());
      const result = new Date(year, monthIndex, day);
      result.setDate(result.getDate() + weeks * 7 + days);
      return result;
    }

    function monthDayDiff(first, second) {
      const start = first.utcMs <= second.utcMs ? first : second;
      const end = first.utcMs <= second.utcMs ? second : first;
      let months = (end.year - start.year) * 12 + end.month - start.month;
      let anchor = addMonths(start, months);

      if (anchor.utcMs > end.utcMs) {
        months -= 1;
        anchor = addMonths(start, months);
      }

      return {
        months,
        days: Math.round((end.utcMs - anchor.utcMs) / dayMs)
      };
    }

    function plural(value, word) {
      return `${value} ${word}${value === 1 ? "" : "s"}`;
    }

    function utcStringFor(date) {
      return [
        weekdays[date.getUTCDay()],
        months[date.getUTCMonth()],
        pad2(date.getUTCDate()),
        date.getUTCFullYear(),
        `${pad2(date.getUTCHours())}:${pad2(date.getUTCMinutes())}:${pad2(date.getUTCSeconds())}`,
        "GMT"
      ].join(" ");
    }

    function renderEpoch(prefix, date) {
      const epochInput = $(`${prefix}-epoch`);
      let epoch = "";
      let local = "";
      let utc = "";

      if (date) {
        const time = epochTimes[prefix] || clock(new Date());
        const epochDate = new Date(date.year, date.month - 1, date.day, ...time);
        epoch = String(Math.floor(epochDate.getTime() / 1000));
        local = epochDate.toString();
        utc = utcStringFor(epochDate);
      }

      if (document.activeElement !== epochInput) {
        epochInput.value = epoch;
      }

      $(`${prefix}-epoch-local`).textContent = local;
      $(`${prefix}-epoch-utc`).textContent = utc;
      $(`${prefix}-epoch-copy`).textContent = epoch ? `${epoch} - ${local} (${utc})` : "";
    }

    function renderDifference(first, second) {
      if (!first || !second) {
        document.querySelectorAll("output").forEach((output) => {
          output.textContent = "";
        });
        return;
      }

      const days = Math.round(Math.abs(second.utcMs - first.utcMs) / dayMs);
      const weeks = Math.floor(days / 7);
      const weekDays = days % 7;
      const monthsDays = monthDayDiff(first, second);

      [
        ["days", plural(days, "day")],
        ["weeks-days", `${plural(weeks, "week")}, ${plural(weekDays, "day")}`],
        ["months-days", `${plural(monthsDays.months, "month")}, ${plural(monthsDays.days, "day")}`],
        ["hours", plural(days * 24, "hour")],
        ["minutes", plural(days * 24 * 60, "minute")],
        ["seconds", plural(days * 24 * 60 * 60, "second")]
      ].forEach(([id, text]) => {
        $(id).textContent = text;
      });
    }

    function readInteger(name) {
      const text = named(name).value.trim();
      return text === "" ? 0 : (/^-?\d+$/.test(text) ? Number(text) : null);
    }

    function renderAddSubtract() {
      const base = readDate("calc");
      const days = readInteger("add-days");
      const weeks = readInteger("add-weeks");
      const months = readInteger("add-months");
      const years = readInteger("add-years");

      $("add-result").textContent = !base || [days, weeks, months, years].includes(null)
        ? ""
        : addToLocalDate(base, years, months, weeks, days).toDateString();
    }

    function render() {
      const first = readDate("first");
      const second = readDate("second");

      renderEpoch("first", first);
      renderEpoch("second", second);
      renderDifference(first, second);
      renderAddSubtract();
    }

    function syncDateFromEpoch(field) {
      const prefix = field.dataset.epoch;
      const text = field.value.trim();
      const match = text.match(/^-?\d+/);

      if (!match) {
        ["year", "month", "day"].forEach((part) => {
          dateField(prefix, part).value = "";
        });
        epochTimes[prefix] = null;
        render();
        return;
      }

      const epochDate = new Date(Number(match[0]) * 1000);
      if (Number.isNaN(epochDate.getTime())) return;

      setDateFields(prefix, epochDate);
      epochTimes[prefix] = clock(epochDate);
      render();
    }

    document.addEventListener("input", (event) => {
      const field = event.target;
      if (!(field instanceof HTMLInputElement)) return;

      if (field.matches('input[name$="-year"], input[name$="-month"], input[name$="-day"]')) {
        field.value = field.value.replace(/\D/g, "");

        if (field.name.startsWith("first-") || field.name.startsWith("second-")) {
          epochTimes[field.name.split("-")[0]] = clock(new Date());
        }

        render();
      } else if (field.matches("[data-epoch]")) {
        field.value = signedDigits(field.value);

        if (!field.value || event.inputType === "insertFromPaste") {
          syncDateFromEpoch(field);
        }
      } else if (field.matches(".amount")) {
        field.value = signedDigits(field.value);
        renderAddSubtract();
      }
    });

    document.addEventListener("paste", (event) => {
      if (event.target instanceof HTMLInputElement && event.target.matches("[data-epoch]")) {
        window.setTimeout(() => syncDateFromEpoch(event.target), 0);
      }
    });

    document.addEventListener("change", (event) => {
      if (event.target instanceof HTMLInputElement && event.target.matches("[data-epoch]")) {
        syncDateFromEpoch(event.target);
      }
    });

    document.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-copy]");
      if (!button) return;

      const output = $(button.dataset.copy);
      const text = (output.value || output.textContent || "").trim();
      if (!text) return;

      await navigator.clipboard.writeText(text);
      const original = button.textContent;
      button.textContent = "Copied";
      window.setTimeout(() => {
        button.textContent = original;
      }, 900);
    });

    const today = new Date();
    setDateFields("second", today);
    setDateFields("calc", today);
    epochTimes.second = clock(today);
    render();
  </script>
</body>
</html>
